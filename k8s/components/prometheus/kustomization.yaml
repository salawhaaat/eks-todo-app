# Prometheus monitoring component - alert rules and Slack webhook secret
# NOTE: prometheus-values.yaml is used during Helm install, not via kubectl apply
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: monitoring

resources:
  - rules.yaml
  - alertmanager-config.yaml

labels:
  - pairs:
      component: prometheus
    includeSelectors: false
