# Deployment for Flask app
# Deployment manages multiple replicas of stateless pods
# If a pod crashes, it automatically creates a new one
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-app
  namespace: todo-app
  labels:
    app: flask-app
spec:
  replicas: 1                 # Run 1 Flask pod
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0       # No downtime during updates
      maxSurge: 1             # One extra pod spun up before old one terminates
  selector:
    matchLabels:
      app: flask-app
  template:
    metadata:
      labels:
        app: flask-app
    spec:
      containers:
      - name: flask
        image: salawhaaat/todo-app:latest
        imagePullPolicy: Always  # Always pull latest image
        ports:
        - containerPort: 5000
          name: http
        # Environment variables for MongoDB connection
        env:
        - name: MONGO_HOST
          value: "mongo.todo-app.svc.cluster.local"  # FQDN for cross-namespace reliability
        - name: MONGO_PORT
          value: "27017"
        # Resource requests help Kubernetes schedule pods
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        # Health check - restart pod if unhealthy
        livenessProbe:
          httpGet:
            path: /
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 10
        # Readiness check - only send traffic when pod is ready
        readinessProbe:
          httpGet:
            path: /
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 10
