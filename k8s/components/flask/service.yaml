# Service for Flask app
# LoadBalancer type exposes the app externally
# Distributes traffic across all Flask pods
apiVersion: v1
kind: Service
metadata:
  name: flask-service
  namespace: todo-app
  labels:
    app: flask-app
spec:
  type: LoadBalancer           # External access
  selector:
    app: flask-app             # Route to Flask pods
  ports:
  - port: 80                   # External port
    targetPort: http           # Container port 5000
    protocol: TCP
